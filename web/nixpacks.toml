# Nixpacks build overrides for Railway.
#
# We delete the macOS-generated package-lock.json before install so
# npm resolves Linux-native optional deps (@tailwindcss/oxide) freshly
# in the build container — see npm/cli#4828.
#
# The Claude Code CLI now ships as @anthropic-ai/claude-code (pure JS,
# no platform binary), so a regular npm install picks it up. We point
# the SDK at the installed cli.js via CLAUDE_CODE_EXECUTABLE below.
[phases.install]
cmds = [
  "rm -f package-lock.json",
  "npm install --include=optional",
  # Belt-and-suspenders for the tailwind oxide native binary, which
  # npm has historically dropped on Linux even with --include=optional.
  "npm install --no-save @tailwindcss/oxide-linux-x64-gnu@latest || true",
  "echo '=== node_modules/@anthropic-ai/ ===' && ls node_modules/@anthropic-ai/ || true",
  "echo '=== claude-code package ===' && ls -la node_modules/@anthropic-ai/claude-code/ || true",
  "echo '=== .bin/claude ===' && ls -la node_modules/.bin/claude || true",
]

# Pointed at the JS entrypoint of @anthropic-ai/claude-code. The SDK's
# query() invokes this directly via Node, so an executable bit isn't
# strictly required — npm sets one anyway.
#
# HOME=/tmp ensures Claude Code's CLI has a writable directory for its
# `~/.claude/` config + cache files. Railway containers' default HOME
# may not be writable depending on the user the app runs as.
[variables]
CLAUDE_CODE_EXECUTABLE = "/app/node_modules/.bin/claude"
HOME = "/tmp"
# Railway runs containers as root. Claude Code blocks
# --dangerously-skip-permissions under root unless this is set, signaling
# the environment is already sandboxed.
IS_SANDBOX = "1"
