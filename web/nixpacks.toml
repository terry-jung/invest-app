# Nixpacks build overrides for Railway.
#
# Default Next.js detection runs `npm ci`, which trips on a known npm bug
# (https://github.com/npm/cli/issues/4828) when a macOS-generated
# package-lock.json is used to install native deps on Linux x64. The
# specific failure: @tailwindcss/oxide's Linux binary is missing because
# npm treats the platform-specific optional deps from a foreign-arch
# lockfile as out-of-platform and skips them — even with `npm install
# --include=optional`, npm still respects the lockfile's platform-locked
# entries.
#
# Reliable fix: delete the lockfile inside the build container before
# running npm install. The Linux container then resolves dependencies
# freshly against package.json and grabs the correct native binaries.
# The lockfile in the repo continues to serve macOS dev unchanged.
[phases.install]
cmds = [
  "rm -f package-lock.json",
  "npm install --include=optional",
  # Belt-and-suspenders: even with --include=optional, npm keeps silently
  # skipping the Linux native binaries for @tailwindcss/oxide and the
  # Claude Agent SDK on Railway (npm/cli#4828, made worse by npm's strict
  # os/cpu constraint handling). Direct install with --no-save normally
  # works but isn't reliable across Nixpacks build cache states.
  #
  # Most-deterministic fallback: `npm pack` downloads the tarball with
  # ZERO platform-constraint enforcement, then we manually extract the
  # `claude` binary into a stable known path. We then point the SDK at
  # it via the CLAUDE_CODE_EXECUTABLE env var read in our route handlers.
  "npm install --no-save @tailwindcss/oxide-linux-x64-gnu@latest || true",
  "mkdir -p /app/bin",
  "cd /app/bin && npm pack @anthropic-ai/claude-agent-sdk-linux-x64@latest && tar xzf anthropic-ai-claude-agent-sdk-linux-x64-*.tgz && chmod +x package/claude && mv package claude-cli",
  "echo '=== /app/bin contents ===' && ls -la /app/bin/claude-cli/ || true",
  "echo '=== node_modules/@anthropic-ai/ ===' && ls node_modules/@anthropic-ai/ || true",
  "echo '=== node_modules/@tailwindcss/ ===' && ls node_modules/@tailwindcss/ || true",
]

# CLAUDE_CODE_EXECUTABLE points the SDK at the binary we extracted via
# npm pack. Read by our route handlers and passed as
# `pathToClaudeCodeExecutable` to the SDK's query() options.
[variables]
CLAUDE_CODE_EXECUTABLE = "/app/bin/claude-cli/claude"
