# Nixpacks build overrides for Railway.
#
# Default Next.js detection runs `npm ci`, which trips on a known npm bug
# (https://github.com/npm/cli/issues/4828) when a macOS-generated
# package-lock.json is used to install native deps on Linux x64. The
# specific failure: @tailwindcss/oxide's Linux binary is missing because
# npm treats the platform-specific optional deps from a foreign-arch
# lockfile as out-of-platform and skips them — even with `npm install
# --include=optional`, npm still respects the lockfile's platform-locked
# entries.
#
# Reliable fix: delete the lockfile inside the build container before
# running npm install. The Linux container then resolves dependencies
# freshly against package.json and grabs the correct native binaries.
# The lockfile in the repo continues to serve macOS dev unchanged.
[phases.install]
cmds = [
  "rm -f package-lock.json",
  "npm install --include=optional",
  # Belt-and-suspenders: even with --include=optional, npm has been
  # silently skipping the Linux native binaries for both Tailwind v4 and
  # the Claude Agent SDK (npm/cli#4828). Force-install them as direct
  # add-ons so they land in node_modules unconditionally. --no-save
  # keeps package.json untouched.
  "npm install --no-save @tailwindcss/oxide-linux-x64-gnu@latest @anthropic-ai/claude-agent-sdk-linux-x64@latest",
  # Print contents so future build logs surface install state at a glance.
  "echo '=== node_modules/@anthropic-ai/ ===' && ls -la node_modules/@anthropic-ai/ || true",
  "echo '=== node_modules/@tailwindcss/ ===' && ls -la node_modules/@tailwindcss/ || true",
]
